server:
  port: ${PORT:8080}
  address: 0.0.0.0
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:file:./data/ai_outfit;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
jwt:
  secret: ai-outfit-system-secret-key-2024
  expire: 86400000
ai:
  model:
    api-url: https://api.coze.cn/open_api/v2/chat
    api-key: ''
  image:
    api-url: ''
    api-key: ''
  weather:
    api-url: https://restapi.amap.com/v3/weather/weatherInfo
    api-key: '878015b2b736ae5a5939930ff43cef92'
  daily-limit: 10
  session-expire: 30
  domain-rules-enabled: true
  retry-times: 2
  negative-prompt: true
app:
  upload-dir: uploads/avatar
coze:
  api-url: https://api.coze.cn/v1/workflow/run
  api-key: pat_fyGbQE1YnJ7YyGWWUGWA84pewm2IfcC0HXgeuz9xEWyrtLLk3gJcdt8PR6SxnkCO
  workflow-id: 7663396885537783843
