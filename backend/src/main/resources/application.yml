server:
  port: 8080

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/ai_outfit?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ai-outfit-system-secret-key-2024
  expire: 86400000

ai:
  model:
    api-url: https://api.coze.cn/open_api/v2/chat
    api-key: ''
  image:
    api-url: ''
    api-key: ''
  weather:
    api-url: https://restapi.amap.com/v3/weather/weatherInfo
    api-key: '57ea4f63c8e4e21b6c20e41f2f9c9f1f'
  daily-limit: 10
  session-expire: 30
  domain-rules-enabled: true
  retry-times: 2
  negative-prompt: true
